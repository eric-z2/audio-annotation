<!doctype html>
<html lang="en">
<head>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <link
        href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css"
        rel="stylesheet"
        type="text/css"
    />
    <script src="https://unpkg.com/@jspsych/plugin-html-audio-response@1.0.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-initialize-microphone@1.0.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script>

    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    <script src="{% static 'utils.js' %}"></script>
    <script src="{% static 'essay_annotation.js' %}"></script>

    <title>{% block title %}Audio Annotation Main Page{% endblock %}</title>

    <script>
        window.addEventListener('unhandledrejection', (e) => {
            console.log('Unhandled promise rejection: ' + e.reason);
            document.getElementById('error-message').innerHTML =
                'An error occurred during loading. This could be because your microphone is blocked by your browser settings. Please check your settings and try again.';
        });

        async function beginTrials() {
            const essayJson = await loadEssayJson();
            const aitaJson = await loadAitaJson();

            const timeline = createTimeline(essayJson, aitaJson);

            return timeline;
        }

        (async () => {
            const jsPsych = initJsPsych({
                display_element: 'jspsych-target',
            });

            const timeline = await beginTrials();

            jsPsych.run(timeline);
        })();
    </script>
</head>

<body>
    <div class="top-bar">
        <div class="brand">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" 
                    fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
            </div>
            <h1>Perspectivism Audio Annotation</h1>
        </div>
        <div class="step-indicator">
            <span class="sep">Intro</span>
            <span class="sep">/</span>
            <span class="active">Tasks</span>
        </div>
    </div>
    <div class="card">
        <div id="section">
            <div
                id="error-message"
                style="text-align: center; font-size: large; color: red"
            ></div>
            <div id="jspsych-target"></div>
        </div>
    </div>
</body>
</html>
