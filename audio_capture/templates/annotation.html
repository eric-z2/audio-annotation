<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>{% block title %}Essay{% endblock %}</title>

    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <script src="https://unpkg.com/@jspsych/plugin-html-audio-response@1.0.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-initialize-microphone@1.0.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>

</head>

<body>
    <div id="header">
        {% block header %}
        <h1 id='title'>
            [PROJECT NAME]
        </h1>
        <h2 id='subtitle'>
            [SUBTITLE AND/OR SHORT DESCRIPTION]
        </h2>
        {% endblock %}
    </div>
    <div id="jspsych-target"></div> 
</body>

<script>
    const jsPsych = initJsPsych({
        display_element: 'jspsych-target'
    });

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    var init_mic = {
        type: jsPsychInitializeMicrophone,
    };

    // TODO
    var instruction_essay = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <p>[ESSAY INSTRUCTIONS]</p>
            <p>[PROMPT]</p>
            <p>Preparation. Something about pressing the button below will start recording.</p>
        `,
        choices: ['Begin.']
    }

    var trial_essay = {
        type: jsPsychHtmlAudioResponse,
        stimulus: `
            <p>[ESSAY INSTRUCTIONS]</p>
            <p>[PROMPT: TODO]</p>
            <p>Recording...</p>
            `,
        recording_duration: 3500, // FIX DURATION
        allow_playback: true,
        on_finish: function(data) {
            fetch('/save_audio_essay/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    audio_base64: data.response,
                    essay_id: 1 // PLACEHOLDER
                })
            })
        }
    };

    // TODO
    var instruction_aita = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <p>[AITA_INSTRUCTIONS]</p>
            <p>[PROMPT: TODO]</p>
            <p>Preparation. Something about pressing the button below will start recording.</p>
        `,
        choices: ['Begin.']
    }

    var trial_aita= {
        type: jsPsychHtmlAudioResponse,
        stimulus: `
            <p>[AITA_INSTRUCTIONS]</p>
            <p>[PROMPT: TODO]</p>
            <p>Recording...</p>
            `,
        recording_duration: 3500, // FIX DURATION
        allow_playback: true,
        on_finish: function(data) {
            fetch('/save_audio_aita/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    audio_base64: data.response,
                    aita_id: 1 // PLACEHOLDER
                })
            })
        }
    };

    var timeline = [];

    timeline.push(init_mic);
    timeline.push(instruction_essay);
    timeline.push(trial_essay);
    timeline.push(instruction_aita);
    timeline.push(trial_aita);

    jsPsych.run(timeline);
</script>
</html>
